<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>

    <h1>Formulários em HTML</h1>

    <form method="post">

        <label for="nome">Nome</label>
        <input 
        type="text" 
        name="nome" 
        id="nome" 
        placeholder="Digite o seu nome"
        required
        />

        <br />
        <label for="senha">Senha</label><br />
        <input type="password" />
    </form>
    
</body>
</html>
