<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imagens</title>
  </head>
  <body>
    <h1>Imagens</h1>
    <br />

    <img src="../img/camisa (1).jpg" height="120" alt="camiseta branca" /><br />
    <img
      src="../img/unha.jpeg"
      width="150"
      loading="lazy"
      alt="unha decorada"
    /><br />

    <figure>
      <img src="../img/iphone.jpg" />/>
      <figcaption>Iphone 17 Pro Max Laranja</figcaption>
    </figure>

    <h1>Vídeos</h1>

    <video controls width="400" muted loop poster="../img/camisa (1).jpg">
      <source src="../video/video.mp4" type="video/mp4" />
      Seu navegador não suporta a reprodução de vídeos.
    </video>

    <h1>iframe youtube</h1>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/Bt1AGCual7Q?si=hLJGKJW0NLY2TZeP"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h1>iframe Google Maps</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.086005615255!2d-43.200903588386296!3d-22.910198379166133!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f0c4e687185%3A0x973c7a140b9b61fa!2sEdif%C3%ADcio%20Eco%20Sapuca%C3%AD!5e0!3m2!1spt-BR!2sbr!4v1783607138892!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    >
    </iframe>
  </body>
</html>
